<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Secret Story</title>
    <style>
        body { font-family: 'Palatino', 'Georgia', serif; background-color: #fefcf7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #5a4a42; }
        .login-box { text-align: center; background: #fff; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid #e0d8d0; width: 80%; max-width: 400px; }
        h2 { color: #8b4513; margin-bottom: 20px; }
        input { padding: 12px; margin: 10px 0; border: 1px solid #dcdcdc; border-radius: 20px; width: 80%; text-align: center; font-size: 1rem; }
        button { background: #8b4513; color: white; border: none; padding: 12px 30px; border-radius: 30px; cursor: pointer; font-size: 1rem; margin-top: 10px; transition: background 0.3s; }
        button:hover { background: #5a2e0a; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>My Heart's Gate</h2>
    <p>Please enter the key to our story.</p>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="checkLogin()">Enter</button>
</div>

<script>
    function checkLogin() {
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;

        // Your specific credentials
        if (user === "Irhafani" && pass === "2301") {
            window.location.href = "main.html"; 
        } else {
            alert("Oops! That's not the right key for my heart. Try again, my love.");
        }
    }
</script>
</body>
</html>
