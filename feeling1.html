<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feeling 1</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('frame1.JPG');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Georgia', serif;
        }

        .content-container {
            width: 85%;
            max-width: 400px;
            text-align: center;
            padding: 10px;
        }

        .content-container img {
            max-height: 45vh; 
            width: auto;
            max-width: 100%;
            object-fit: contain;
            border-radius: 40px 10px 40px 10px;
            border: 3px solid #d4a373;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
            margin-bottom: 15px;
        }

        p {
            color: #fffaf0;
            font-size: 1.1rem;
            line-height: 1.5;
            text-shadow: 2px 2px 5px black;
            font-style: italic;
            margin: 10px 0;
        }

        .back-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 20px;
            background-color: #8b0000;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="content-container">
        <!-- Ensure this is saved as img1.png in your lovestory folder -->
        <img src="img1.png" alt="Memory">
        <p>
            Irha, you are the heartbeat of my life and the most beautiful dream that ever came true. Every moment I spend thinking of you brings me closer to our future together. You have taught me the true meaning of love, and I am so grateful to call you mine forever, Irha.
        </p>
        <!-- Button linked to your menu page -->
        <a href="mylove.html" class="back-btn">Back to Choices</a>
    </div>

</body>
</html>
